name: Build EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread oauth2client chardet openpyxl pyinstaller

    - name: Check PyInstaller
      run: |
        pyinstaller --version

    - name: Build exe
      run: |
        pyinstaller --onefile --noconsole app.py

    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: app-exe
        path: dist/app.exe
